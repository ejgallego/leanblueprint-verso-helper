name: Blueprint Pages

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  pages:
    uses: __PAGES_WORKFLOW_REPO__/.github/workflows/blueprint-pages.yml@__PAGES_WORKFLOW_REF__
    with:
      checkout_submodules: true
      harness_enabled: true
      warm_dependency_cache: true
    secrets: inherit
