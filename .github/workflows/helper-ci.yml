name: Helper CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  test:
    name: Test Helper
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Lint GitHub workflows
        uses: docker://rhysd/actionlint:latest
        with:
          args: .github/workflows/helper-ci.yml
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'
      - name: Check Python syntax
        run: python3 -m py_compile scripts/*.py
      - name: Run helper tests
        run: |
          python3 scripts/test_bootstrap.py
          python3 scripts/test_start_new_port.py
          python3 scripts/test_harness_config.py
          python3 scripts/test_harnesslib.py
          python3 scripts/test_export_ci_env.py
          python3 scripts/test_update_ci.py
          python3 scripts/test_check_blueprint_node_kinds.py
          python3 scripts/test_check_lt_similarity.py
          python3 scripts/test_check_source_label_grounding.py
          python3 scripts/test_check_verso_math_delimiters.py
